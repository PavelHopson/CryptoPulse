<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05000a" />
    <title>CryptoPulse 2077 — Neural Finance Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script>
      // Prevent flash of wrong theme
      (function(){
        var t = localStorage.getItem('cryptopulse-theme') || 'cyberpunk';
        if (!['cyberpunk','midnight','light'].includes(t)) t = 'cyberpunk';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body class="font-sans antialiased overflow-x-hidden" style="background:rgb(var(--color-bg));color:rgb(var(--color-text))">
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
