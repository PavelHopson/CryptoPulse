<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05000a" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2305000a'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-weight='bold' font-size='14' fill='%2300f3ff'>CP</text><rect x='2' y='2' width='28' height='28' rx='5' fill='none' stroke='%2300f3ff' stroke-width='1' opacity='.3'/></svg>" />
    <title>CryptoPulse 2077 — Neural Finance Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script>
      // Prevent flash of wrong theme
      (function(){
        var t = localStorage.getItem('cryptopulse-theme') || 'cyberpunk';
        if (!['cyberpunk','midnight','light'].includes(t)) t = 'cyberpunk';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body class="font-sans antialiased overflow-x-hidden" style="background:rgb(var(--color-bg));color:rgb(var(--color-text))">
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
